name: Tms-copilot Customization Sync
on:
  schedule:
    - cron: '0 7 * * 1'  # Mandager kl 07:00
  workflow_dispatch:
jobs:
  sync:
    uses: navikt/copilot/.github/workflows/copilot-customization-sync.yml@main
    with:
      source_repo: https://github.com/navikt/tms-copilot
    permissions:
      contents: write
      pull-requests: write