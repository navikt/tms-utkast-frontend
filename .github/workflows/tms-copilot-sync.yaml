name: Tms-copilot Customization Sync
on:
  schedule:
    - cron: '0 7 * * 1'  # Mandager kl 07:00
  workflow_dispatch:
jobs:
  sync:
    uses: navikt/tms-copilot/.github/workflows/tms-copilot-sync.yml@main
    with:
      source_repo: navikt/tms-copilot
    permissions:
      contents: write
      pull-requests: write